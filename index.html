<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韓国語 固有数詞クイズ</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f2f5;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* スクロールを禁止 */
        }
        #app {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .progress {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button.opt-btn {
            padding: 15px 10px;
            font-size: 1rem;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        button.opt-btn:active {
            background-color: var(--primary-color);
            color: white;
            transform: scale(0.95);
        }
        .result-screen h2 { color: var(--primary-color); }
        .restart-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="quiz-container">
        <div class="progress" id="progress">第 1 / 20 問</div>
        <div id="section-label" style="font-size: 0.8rem; color: var(--primary-color);">Section 1: 韓 → 日</div>
        <div class="question-text" id="question">読み込み中...</div>
        <div class="options" id="options"></div>
    </div>
</div>

<script>
    const originalData = [
        { kr: "hana", jp: "1つ" }, { kr: "tur", jp: "2つ" }, { kr: "se", jp: "3つ" },
        { kr: "ne", jp: "4つ" }, { kr: "taso", jp: "5つ" }, { kr: "yoso", jp: "6つ" },
        { kr: "irgo", jp: "7つ" }, { kr: "yodor", jp: "8つ" }, { kr: "ahop", jp: "9つ" },
        { kr: "yor", jp: "10つ" }
    ];

    let quizList = [];
    let currentIndex = 0;
    let score = 0;

    function initQuiz() {
        // Section 1: 韓 -> 日
        const s1 = originalData.map(item => ({ q: item.kr, a: item.jp, type: "韓 → 日", choices: originalData.map(d => d.jp) }));
        // Section 2: 日 -> 韓
        const s2 = originalData.map(item => ({ q: item.jp, a: item.kr, type: "日 → 韓", choices: originalData.map(d => d.kr) }));
        
        quizList = [...s1, ...s2];
        currentIndex = 0;
        score = 0;
        showQuestion();
    }

    function showQuestion() {
        const current = quizList[currentIndex];
        document.getElementById('progress').innerText = `第 ${currentIndex + 1} / ${quizList.length} 問`;
        document.getElementById('section-label').innerText = current.type;
        document.getElementById('question').innerText = current.q;
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        // 選択肢をシャッフルして表示
        const shuffledChoices = [...current.choices].sort(() => Math.random() - 0.5);
        
        shuffledChoices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = choice;
            btn.onclick = () => handleAnswer(choice);
            optionsContainer.appendChild(btn);
        });
    }

    function handleAnswer(selected) {
        if (selected === quizList[currentIndex].a) {
            score++;
        }
        
        currentIndex++;
        if (currentIndex < quizList.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="result-screen">
                <h2>学習完了！</h2>
                <p style="font-size: 1.2rem;">スコア: ${score} / ${quizList.length}</p>
                <button class="restart-btn" onclick="location.reload()">もう一度挑戦</button>
            </div>
        `;
    }

    initQuiz();
</script>

</body>
</html>
